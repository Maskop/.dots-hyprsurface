################
### MONITORS ###
################

monitorv2 {
  output = eDP-1
  mode = 2736x1824@59.95900
  position = 0x0
  scale = 1.9
  transform = 0
  disabled = false
  bitdepth = 10
}



###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = qs ipc call AppLauncher toggle  


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch- 
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

################
### SOURCING ###
################

source = ~/.config/hypr/hyprland/autostart.conf
source = ~/.config/hypr/hyprland/keybinds.conf
source = ~/.config/hypr/hyprland/look.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/windows-workspaces.conf
source = ~/.config/hypr/hyprland/plugins.conf
